[build-system]
requires = [
	#"ipp",
    	#"ipp-devel",
    	"pip",
	"nanobind",
	"scikit-build-core>=0.11.0",
	"nanobind",
    	#"intel-openmp>=2025.0.5",
]
build-backend = "scikit_build_core.build"

[project.urls]
#homepage = "https://ccpi.ac.uk/cil"
homepage = "https://tomographicimaging.github.io/CIL"
documentation = "https://tomographicimaging.github.io/CIL/nightly"
repository = "https://github.com/TomographicImaging/CIL"
changelog = "https://github.com/TomographicImaging/CIL/blob/master/CHANGELOG.md"

[dependency-groups]
dev = [
    "ipp>=2021.12.1,<2022.0",
    "numpy>=1.26,<2.0",
    "pip>=25.0.1",
    "ipp-devel",
    "nanobind",
    "pytest",
    "scikit-image>=0.25.2",
]

[project]
name = "cil"
#dynamic = ["version"]
version = "0.25.0"
description = "Core Imaging Library"
license = {text = "Apache-2.0"}
maintainers = [{name="CIL developers", email="tomography+cil@stfc.ac.uk"}]
requires-python = ">=3.10"
readme = "README.md"
keywords = ["tomography", "optimisation"]
dependencies = [
    "dxchange>=0.0.1",
    "h5py>=3.13.0",
    #"ipp>=2021.12.1,<2022.0",
    #"ipp-include>=2021.12.1,<2022.0",
    #"ipp-static>=2021.12.1,<2022.0",
    "numba>=0.61.0",
    "olefile>=0.46",
    "pillow>=11.1.0",
    "pywavelets>=1.8.0",
    "scipy>=1.4.0",
    "tqdm>=4.67.1",
    "zenodo-get>=1.6",
    "scikit-build-core>=0.11.0",
]

[tool.scikit-build]
search.site-packages = true
wheel.py-api = "cp312"



[tool.scikit-build.wheel.packages]
cil = "Wrappers/Python/cil"
