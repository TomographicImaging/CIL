name: cil_dev
channels:
  - conda-forge
  - https://software.repos.intel.com/python/conda
dependencies:
  - python=3.12
  - numpy=1.26
  - llvm-openmp
  - ccpi::cil-data >=22
  - numba
  - astra-toolbox=2.1=py*
  - cvxpy!=1.8.2
  - python-wget
  - scikit-image
  - matplotlib-base >=3.3.0
  - h5py
  - pillow
  - dxchange >=0.2.1
  - olefile >=0.46
  - pywavelets
  - numba
  - tqdm
  - zenodo_get >=1.6
  - pip
  - pip:
    - unittest-parametrize
    